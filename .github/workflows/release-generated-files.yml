name: Release Generated Files

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare directories
        run: mkdir -p artifacts/current artifacts/previous artifacts/changed dist

      - name: Find previous release with ALL_FILES.jar
        id: prev-release
        uses: actions/github-script@v7
        with:
          script: |
            const currentReleaseId = context.payload.release.id;
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const previousRelease = releases.find(release =>
              release.id !== currentReleaseId &&
              !release.draft &&
              release.assets.some(asset => asset.name === "ALL_FILES.jar")
            );

            if (!previousRelease) {
              core.info("No previous release with ALL_FILES.jar found.");
              core.setOutput("found", "false");
              return;
            }

            core.info(`Using previous release ${previousRelease.tag_name}`);
            core.setOutput("found", "true");
            core.setOutput("tag", previousRelease.tag_name);

      - name: Download and extract previous ALL_FILES.jar
        if: steps.prev-release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.prev-release.outputs.tag }}" \
            --pattern "ALL_FILES.jar" \
            --dir /tmp/prev-release
          unzip -q /tmp/prev-release/ALL_FILES.jar -d artifacts/previous
          echo "Extracted previous release into artifacts/previous/"

      - name: No previous release found
        if: steps.prev-release.outputs.found != 'true'
        run: echo "No previous ALL_FILES.jar found. Proceeding with first-release behavior."

      - name: Generate artifacts for current release
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: python tools/generate_txt_files.py

      - name: Diff current vs previous
        run: python tools/diff_generated_files.py

      - name: Create archives
        run: python tools/create_archives.py

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/ALL_FILES.jar \
            dist/CHANGED_FILES.jar \
            --clobber