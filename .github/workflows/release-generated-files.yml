name: Release Generated Files

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to rebuild assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target release
        id: target-release
        uses: actions/github-script@v7
        with:
          script: |
            let tagName;
            let releaseId;

            if (context.eventName === "workflow_dispatch") {
              tagName = context.payload.inputs.release_tag;

              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });

              releaseId = release.id;
            } else {
              tagName = context.payload.release.tag_name;
              releaseId = context.payload.release.id;
            }

            core.info(`Target release: ${tagName}`);
            core.setOutput("tag", tagName);
            core.setOutput("id", String(releaseId));

      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target-release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare directories
        run: mkdir -p artifacts/current artifacts/previous artifacts/changed dist

      - name: Find previous release with ALL_FILES.jar
        id: prev-release
        uses: actions/github-script@v7
        with:
          script: |
            const currentReleaseId = Number("${{ steps.target-release.outputs.id }}");
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const previousRelease = releases.find(release =>
              release.id !== currentReleaseId &&
              !release.draft &&
              release.assets.some(asset => asset.name === "ALL_FILES.jar")
            );

            if (!previousRelease) {
              core.info("No previous release with ALL_FILES.jar found.");
              core.setOutput("found", "false");
              return;
            }

            core.info(`Using previous release ${previousRelease.tag_name}`);
            core.setOutput("found", "true");
            core.setOutput("tag", previousRelease.tag_name);

      - name: Download and extract previous ALL_FILES.jar
        if: steps.prev-release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.prev-release.outputs.tag }}" \
            --pattern "ALL_FILES.jar" \
            --dir /tmp/prev-release
          unzip -q /tmp/prev-release/ALL_FILES.jar -d artifacts/previous
          echo "Extracted previous release into artifacts/previous/"

      - name: No previous release found
        if: steps.prev-release.outputs.found != 'true'
        run: echo "No previous ALL_FILES.jar found. Proceeding with first-release behavior."

      - name: Fetch dependencies and generate artifacts
        env:
          VERSION: ${{ steps.target-release.outputs.tag }}
        run: python tools/fetch_deps.py

      - name: Diff current vs previous
        env:
          VERSION: ${{ steps.target-release.outputs.tag }}
          PREVIOUS_VERSION: ${{ steps.prev-release.outputs.tag }}
        run: python tools/diff_generated_files.py

      - name: Create archives
        run: python tools/create_archives.py

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.target-release.outputs.tag }}" \
            dist/ALL_FILES.jar \
            dist/CHANGED_FILES.jar \
            --clobber
